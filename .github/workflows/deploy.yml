# .github/workflows/deploy.yml
# Build & Deploy khi có Push / Merge → main
# Flow: Test → Build Maven → Build Docker → Push GHCR → Trigger Render Deploy
# Frontend (Vercel) tự deploy qua GitHub Integration — không cần xử lý ở đây
# Xem docs/11-DEPLOYMENT.md mục 3.3

name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  backend:
    name: Test → Build → Push GHCR → Deploy Render
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Cần để push image lên GHCR với secrets.GITHUB_TOKEN

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Step này FAIL → job dừng ngay, các step sau (build/push/deploy) KHÔNG chạy
      - name: Run Unit Test + Integration Test
        working-directory: backend
        run: mvn clean verify
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Build Maven package
        working-directory: backend
        run: mvn clean package -DskipTests
        # -DskipTests: test đã chạy ở step trên, không cần chạy lại

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # secrets.GITHUB_TOKEN là token mặc định GitHub tự cấp cho mỗi workflow run
          # Đã có quyền packages:write nhờ khai báo `permissions` ở trên — KHÔNG cần tạo PAT riêng

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Tag kép:
          #   latest → Render luôn pull bản mới nhất
          #   ${{ github.sha }} → truy vết/rollback về đúng commit (xem docs/11-DEPLOYMENT.md mục 9)

      - name: Trigger Render Deploy via Deploy Hook
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        # Render Deploy Hook URL lưu trong GitHub Actions Secrets với key: RENDER_DEPLOY_HOOK_URL
        # -fsSL: fail on HTTP error, silent, follow redirects

  # Job Frontend: KHÔNG cần định nghĩa ở đây.
  # Vercel GitHub Integration tự lắng nghe push lên `main` và build/deploy độc lập.
