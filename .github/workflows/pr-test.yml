# .github/workflows/pr-test.yml
# Gate chạy Unit Test + Integration Test khi có Pull Request → main
# KHÔNG build Docker image, KHÔNG deploy — chỉ xác nhận test pass
# → Kết quả check này bắt buộc pass trước khi được merge (cấu hình Branch Protection trên GitHub)
# Xem docs/11-DEPLOYMENT.md mục 3.2

name: PR Test Gate

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Test + Integration Test
        working-directory: backend
        run: mvn clean verify
        env:
          JWT_SECRET: test-secret-for-ci-must-be-at-least-256-bits-long-placeholder
        # Testcontainers tự pull PostgreSQL image và chạy Flyway migration thật —
        # không cần service container riêng trong workflow (xem docs/10-TESTING.md mục 6)
